defaults:
  - model: qwen
  - _self_

hydra:
  run:
    dir: .
  output_subdir: null

experiment:
  task: "mnli"
  ood_task: "sst2" #"rte"
  batch_size: 32
  learning_rate: 2e-4
  num_epochs: 3
  swag_start_ratio: 0.75
  swag_total_samples: 30
  swag_eval_samples: 15
  swag_scale: 2.0
  max_num_models: 20
  seed: 42
  save_path: "outputs"
  max_length: 128
  dataset_percentage: 0.4

